name: Preprocessing Pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - "preprocessing/**"
      - ".github/workflows/preprocessing.yml"

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Download raw dataset
        run: |
          mkdir -p dataset/open+university+learning+analytics+dataset
          curl -fL --retry 5 --retry-delay 5 \
            https://archive.ics.uci.edu/static/public/349/open+university+learning+analytics+dataset.zip \
            -o dataset.zip
          unzip -q dataset.zip -d dataset/open+university+learning+analytics+dataset/
          test -f dataset/open+university+learning+analytics+dataset/studentInfo.csv
          test -f dataset/open+university+learning+analytics+dataset/studentVle.csv

      - name: Run preprocessing
        run: python preprocessing/automate_yesaya.py

      - name: Validate cleaned dataset
        run: |
          test -s open_UL_analysis_preprocessing/student_cleaned.csv
          python - <<'PY'
          import pandas as pd
          df = pd.read_csv("open_UL_analysis_preprocessing/student_cleaned.csv")
          assert "target" in df.columns
          assert "target_label" in df.columns
          assert len(df) > 0
          assert df.isna().sum().sum() == 0
          print(df.shape)
          print(df["target_label"].value_counts())
          PY

      - name: Upload cleaned dataset
        uses: actions/upload-artifact@v4
        with:
          name: student-cleaned-dataset
          path: |
            open_UL_analysis_preprocessing/student_cleaned.csv
            open_UL_analysis_preprocessing/preprocessing_metadata.json
